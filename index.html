<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Create a job-winning, ATS-friendly resume in minutes with our Free AI Resume Builder." />
    <!-- Theme Color matches the purple theme -->
    <meta name="theme-color" content="#4F46E5" />
    <title>Free AI Resume Builder | QuickResume.business</title>
  </head>
  <body class="bg-[var(--color-bg)] antialiased text-[var(--text-main)] font-sans">
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.body.classList.add('theme-light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
