<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload Primary Font -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Free AI-powered ATS resume builder. Create professional resumes in minutes." />
    <meta name="keywords" content="resume builder, AI resume, ATS resume, cover letter generator, free resume maker, professional resume templates, text to resume" />
    <meta name="author" content="Quick Resume" />
    
    <!-- Robots and Indexing -->
    <meta name="robots" content="index, follow" />
    <!-- Deploy Note: Place robots.txt and sitemap.xml in the public/ folder. -->
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://quickresume.app" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Quick Resume | AI ATS Resume Builder" />
    <meta property="og:description" content="Build your perfect, ATS-friendly resume using AI in minutes." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quickresume.app" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=1200&h=630&fit=crop" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quick Resume | AI ATS Resume Builder" />
    <meta name="twitter:description" content="Build your perfect, ATS-friendly resume using AI in minutes." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=1200&h=630&fit=crop" />

    <!-- Theme Color matches the blue theme -->
    <meta name="theme-color" content="#7c3aed" />

    <!-- Schema.org App Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Quick Resume",
        "applicationCategory": "BusinessApplication",
        "description": "Free AI-powered ATS resume builder. Create professional resumes in minutes.",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    
    <title>Quick Resume | ATS Resume & Cover Letter Builder</title>
  </head>
  <body class="bg-[var(--color-bg)] antialiased text-[var(--text-main)] font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
